# Aerospace - Tiling Window Manager for macOS
# Docs: https://nikitabobko.github.io/AeroSpace/commands

after-login-command = []
after-startup-command = []

start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
key-mapping.preset = 'qwerty'

# Mouse follows focus when switching monitors
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Gaps
[gaps]
inner.horizontal = [ { monitor."Built-in Retina Display" = 15 }, 20  ]
inner.vertical =   [ { monitor."Built-in Retina Display" = 15 }, 20  ]
outer.left =       [ { monitor."Built-in Retina Display" = 20 }, 25  ]
outer.bottom =     [ { monitor."Built-in Retina Display" = 20 }, 25  ]
outer.top =        [ { monitor."Built-in Retina Display" = 20 }, 25  ]
outer.right =      [ { monitor."Built-in Retina Display" = 20 }, 25  ]

# ============================================================
# Key Bindings
# ============================================================
[mode.main.binding]

# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus (vim-style)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-shift-minus = 'resize smart -100'
alt-shift-equal = 'resize smart +100'

# Fullscreen
alt-shift-f = 'fullscreen'

# Workspaces (numbered)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Workspaces (named)
alt-d = 'workspace D' # Development (terminals, IDE)
alt-w = 'workspace W' # Web (browsers)
alt-c = 'workspace C' # Chat (Slack, Messages)
alt-m = 'workspace M' # Mail (Outlook, Apple Mail)
alt-n = 'workspace N' # Notes (Notion, Apple Notes)
alt-s = 'workspace S' # Productivity (Calendar, misc)
alt-z = 'workspace Z' # Zoom / Video calls

# Move window to workspace (numbered)
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Move window to workspace (named)
alt-shift-d = 'move-node-to-workspace D'
alt-shift-w = 'move-node-to-workspace W'
alt-shift-c = 'move-node-to-workspace C'
alt-shift-m = 'move-node-to-workspace M'
alt-shift-n = 'move-node-to-workspace N'
alt-shift-s = 'move-node-to-workspace S'
alt-shift-z = 'move-node-to-workspace Z'

# Quick switch
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Service mode
alt-shift-semicolon = 'mode service'

# ============================================================
# Service Mode (Alt+Shift+; to enter, Esc to exit)
# ============================================================
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = ['layout floating tiling', 'mode main'] # toggle floating
backspace = ['close-all-windows-but-current', 'mode main']
q = ['enable toggle'] # disable/enable window management

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# ============================================================
# Auto-assign apps to workspaces
# ============================================================

## Development (D)
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace D'

[[on-window-detected]]
if.app-id = 'com.googlecode.iterm2'
run = 'move-node-to-workspace D'

[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij'
run = 'move-node-to-workspace D'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace D'

## Web (W)
[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace W'

## Chat (C)
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = 'move-node-to-workspace C'

## Mail (M)
[[on-window-detected]]
if.app-id = 'com.microsoft.Outlook'
run = 'move-node-to-workspace M'

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = 'move-node-to-workspace M'

[[on-window-detected]]
if.app-id = 'com.google.Gmail'
run = 'move-node-to-workspace M'

## Notes (N)
[[on-window-detected]]
if.app-id = 'notion.id'
run = 'move-node-to-workspace N'

[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = 'move-node-to-workspace N'

## Productivity (S)
[[on-window-detected]]
if.app-id = 'com.apple.iCal'
run = 'move-node-to-workspace S'

## Zoom / Video (Z)
[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = 'move-node-to-workspace Z'

[[on-window-detected]]
if.app-id = 'com.apple.FaceTime'
run = 'move-node-to-workspace Z'

[[on-window-detected]]
if.app-id = 'com.google.Meet'
run = 'move-node-to-workspace Z'

## Floating (always float these)
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.during-aerospace-startup = false
if.window-title-regex-substring = 'Picture-in-Picture'
run = ['layout floating']
