# ~/.config/starship.toml
# Emoji-style Starship config — no Nerd Fonts needed!
# Tailored for Java / Spring Boot / Kafka / Kubernetes / Azure

# General settings
add_newline = true
command_timeout = 1000

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$java\
$kotlin\
$gradle\
$docker_context\
$kubernetes\
$azure\
$cmd_duration\
$battery\
$time\
$line_break\
$character"""

# ─── Prompt character ─────────────────────────────
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✖](bold red)"

# ─── Directory ─────────────────────────────────────
[directory]
truncation_length = 3
truncation_symbol = "…/"
format = "[$path]($style) "
style = "bold cyan"

# ─── Git Branch ────────────────────────────────────
[git_branch]
format = "on [🍣 $branch]($style) "
symbol = ""
style = "bold yellow"
truncation_length = 24

# ─── Git Status (the fun part!) ────────────────────
[git_status]
conflicted = "⚔️  ×${count} "
ahead = "🏎️💨 ×${count} "
behind = "🐢 ×${count} "
diverged = "🔱 🏎️💨×${ahead_count} 🐢×${behind_count} "
untracked = "🛤️  ×${count} "
stashed = "📦 "
modified = "📝 ×${count} "
staged = "🗃️  ×${count} "
renamed = "📛 ×${count} "
deleted = "🗑️  ×${count} "
up_to_date = "✅ "
style = "bright-white"
format = "$all_status$ahead_behind"

# ─── Java ──────────────────────────────────────────
[java]
format = "via [☕ $version]($style) "
style = "bold red"
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", "build.sbt", ".java-version"]
detect_extensions = ["java", "class", "jar"]

# ─── Kotlin ────────────────────────────────────────
[kotlin]
format = "via [🟣 $version]($style) "
style = "bold blue"

# ─── Gradle ────────────────────────────────────────
[gradle]
format = "via [🐘 $version]($style) "
style = "bold bright-cyan"

# ─── Docker ────────────────────────────────────────
[docker_context]
format = "on [🐳 $context]($style) "
style = "bold blue"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# ─── Kubernetes ────────────────────────────────────
[kubernetes]
disabled = false
format = "on [⛵ $context/$namespace]($style) "
style = "bold bright-cyan"
detect_files = ["k8s", "kubernetes", "kustomization.yaml"]

# Context aliases — shorten long cluster names
[kubernetes.context_aliases]
"arn:aws:eks:.*:.*:cluster/(.+)" = "🌩️ $1"

# ─── Azure ─────────────────────────────────────────
[azure]
disabled = false
format = "on [☁️ $subscription]($style) "
style = "bold blue"

# ─── Command Duration ─────────────────────────────
[cmd_duration]
min_time = 3_000
format = "took [⏱️ $duration]($style) "
style = "bold yellow"

# ─── Time ──────────────────────────────────────────
[time]
disabled = false
time_format = "%T"
format = "🕐 $time "
style = "bright-white"

# ─── Battery ───────────────────────────────────────
[battery]
full_symbol = "🔋"
charging_symbol = "🔌"
discharging_symbol = "⚡"

[[battery.display]]
threshold = 30
style = "bold red"

[[battery.display]]
threshold = 60
style = "bold yellow"

# ─── Username (shows on SSH) ──────────────────────
[username]
show_always = false
format = "[$user]($style) "
style_user = "bold dimmed blue"
style_root = "bold red"

# ─── Hostname (shows on SSH) ──────────────────────
[hostname]
ssh_only = true
format = "at [$hostname]($style) in "
style = "bold dimmed white"
trim_at = "-"

# ─── Memory (shows when usage > 70%) ──────────────
[memory_usage]
disabled = false
threshold = 70
format = "🧠 [${ram}]($style) "
style = "bold dimmed white"

# ─── Disabled modules (less noise) ────────────────
[package]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[php]
disabled = true
